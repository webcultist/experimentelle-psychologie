<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 200" width="390" height="200" role="img" aria-label="Korrelationstypen: positiv, keine, negativ">
  <title>Korrelationstypen</title>
  <rect width="390" height="200" fill="#f5f0e8" rx="8"/>

  <!-- Title -->
  <text x="195" y="20" text-anchor="middle" font-family="'Source Sans 3', Georgia, serif" font-size="13" font-weight="700" fill="#2a2520">Korrelationstypen</text>

  <!-- ── PANEL 1: Positive Korrelation ── -->
  <rect x="10" y="32" width="110" height="110" rx="4" fill="#fffdf8" stroke="#d4cbbf" stroke-width="1"/>
  <!-- Axes -->
  <line x1="22" y1="130" x2="108" y2="130" stroke="#6b5e52" stroke-width="1.2"/>
  <line x1="22" y1="130" x2="22" y2="42" stroke="#6b5e52" stroke-width="1.2"/>
  <!-- Trend line -->
  <line x1="28" y1="122" x2="102" y2="48" stroke="#2c6e49" stroke-width="1.8" stroke-dasharray="4,3"/>
  <!-- Dots (positive trend) -->
  <circle cx="30" cy="120" r="3.5" fill="#2c6e49" opacity="0.8"/>
  <circle cx="40" cy="112" r="3.5" fill="#2c6e49" opacity="0.8"/>
  <circle cx="48" cy="105" r="3.5" fill="#2c6e49" opacity="0.8"/>
  <circle cx="58" cy="98" r="3.5" fill="#2c6e49" opacity="0.8"/>
  <circle cx="66" cy="88" r="3.5" fill="#2c6e49" opacity="0.8"/>
  <circle cx="76" cy="80" r="3.5" fill="#2c6e49" opacity="0.8"/>
  <circle cx="85" cy="72" r="3.5" fill="#2c6e49" opacity="0.8"/>
  <circle cx="95" cy="63" r="3.5" fill="#2c6e49" opacity="0.8"/>
  <circle cx="103" cy="55" r="3.5" fill="#2c6e49" opacity="0.8"/>
  <!-- Label -->
  <text x="65" y="155" text-anchor="middle" font-family="'Source Sans 3', Georgia, serif" font-size="10" font-weight="700" fill="#2c6e49">Positiv</text>
  <text x="65" y="167" text-anchor="middle" font-family="'Source Sans 3', Georgia, serif" font-size="9" fill="#6b5e52">r ≈ +1</text>

  <!-- ── PANEL 2: Keine Korrelation ── -->
  <rect x="140" y="32" width="110" height="110" rx="4" fill="#fffdf8" stroke="#d4cbbf" stroke-width="1"/>
  <!-- Axes -->
  <line x1="152" y1="130" x2="238" y2="130" stroke="#6b5e52" stroke-width="1.2"/>
  <line x1="152" y1="130" x2="152" y2="42" stroke="#6b5e52" stroke-width="1.2"/>
  <!-- Trend line (flat) -->
  <line x1="158" y1="86" x2="232" y2="86" stroke="#b7950b" stroke-width="1.8" stroke-dasharray="4,3"/>
  <!-- Dots (scattered) -->
  <circle cx="162" cy="95" r="3.5" fill="#b7950b" opacity="0.8"/>
  <circle cx="170" cy="60" r="3.5" fill="#b7950b" opacity="0.8"/>
  <circle cx="178" cy="110" r="3.5" fill="#b7950b" opacity="0.8"/>
  <circle cx="186" cy="72" r="3.5" fill="#b7950b" opacity="0.8"/>
  <circle cx="194" cy="118" r="3.5" fill="#b7950b" opacity="0.8"/>
  <circle cx="203" cy="55" r="3.5" fill="#b7950b" opacity="0.8"/>
  <circle cx="211" cy="100" r="3.5" fill="#b7950b" opacity="0.8"/>
  <circle cx="220" cy="68" r="3.5" fill="#b7950b" opacity="0.8"/>
  <circle cx="228" cy="82" r="3.5" fill="#b7950b" opacity="0.8"/>
  <!-- Label -->
  <text x="195" y="155" text-anchor="middle" font-family="'Source Sans 3', Georgia, serif" font-size="10" font-weight="700" fill="#b7950b">Keine</text>
  <text x="195" y="167" text-anchor="middle" font-family="'Source Sans 3', Georgia, serif" font-size="9" fill="#6b5e52">r ≈ 0</text>

  <!-- ── PANEL 3: Negative Korrelation ── -->
  <rect x="270" y="32" width="110" height="110" rx="4" fill="#fffdf8" stroke="#d4cbbf" stroke-width="1"/>
  <!-- Axes -->
  <line x1="282" y1="130" x2="368" y2="130" stroke="#6b5e52" stroke-width="1.2"/>
  <line x1="282" y1="130" x2="282" y2="42" stroke="#6b5e52" stroke-width="1.2"/>
  <!-- Trend line (negative) -->
  <line x1="288" y1="52" x2="362" y2="126" stroke="#c0392b" stroke-width="1.8" stroke-dasharray="4,3"/>
  <!-- Dots (negative trend) -->
  <circle cx="290" cy="58" r="3.5" fill="#c0392b" opacity="0.8"/>
  <circle cx="300" cy="67" r="3.5" fill="#c0392b" opacity="0.8"/>
  <circle cx="308" cy="76" r="3.5" fill="#c0392b" opacity="0.8"/>
  <circle cx="318" cy="84" r="3.5" fill="#c0392b" opacity="0.8"/>
  <circle cx="326" cy="93" r="3.5" fill="#c0392b" opacity="0.8"/>
  <circle cx="336" cy="101" r="3.5" fill="#c0392b" opacity="0.8"/>
  <circle cx="344" cy="110" r="3.5" fill="#c0392b" opacity="0.8"/>
  <circle cx="354" cy="117" r="3.5" fill="#c0392b" opacity="0.8"/>
  <circle cx="362" cy="124" r="3.5" fill="#c0392b" opacity="0.8"/>
  <!-- Label -->
  <text x="325" y="155" text-anchor="middle" font-family="'Source Sans 3', Georgia, serif" font-size="10" font-weight="700" fill="#c0392b">Negativ</text>
  <text x="325" y="167" text-anchor="middle" font-family="'Source Sans 3', Georgia, serif" font-size="9" fill="#6b5e52">r ≈ -1</text>

  <!-- Caption -->
  <text x="195" y="188" text-anchor="middle" font-family="'Source Sans 3', Georgia, serif" font-size="9" font-style="italic" fill="#6b5e52">Streudiagramme: Punktwolken zeigen die Richtung des Zusammenhangs</text>
</svg>
